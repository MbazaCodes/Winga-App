name: winga_app
description: Winga - Your Trusted Shopping Guide in All Markets
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ^2.3.4

  # Maps
  google_maps_flutter: ^2.6.0

  # Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # UI & Design
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.0.0
  flutter_rating_bar: ^4.0.1
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  geolocator: ^11.0.0
  dio: ^5.4.1
  equatable: ^2.0.5
  uuid: ^4.3.3
  flutter_animate: ^4.5.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
